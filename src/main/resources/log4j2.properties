# =============================================
# 应用日志配置文件
# =============================================

# 根日志级别
rootLogger.level = INFO
rootLogger.appenderRefs = console
rootLogger.appenderRef.console.ref = ConsoleAppender

# 控制台输出
appender.console.type = Console
appender.console.name = ConsoleAppender
appender.console.layout.type = PatternLayout
appender.console.layout.pattern = %d{yyyy-MM-dd HH:mm:ss} [%t] %-5p %c{1} - %m%n

# 应用日志
logger.app.name = com.example
logger.app.level = DEBUG
logger.app.additivity = false
logger.app.appenderRefs = console
logger.app.appenderRef.console.ref = ConsoleAppender

# SQL 日志
logger.sql.name = org.springframework.jdbc
logger.sql.level = DEBUG
logger.sql.additivity = false
logger.sql.appenderRefs = console
logger.sql.appenderRef.console.ref = ConsoleAppender
